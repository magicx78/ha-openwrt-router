<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)"/>
  <!-- Router body -->
  <rect x="48" y="120" width="160" height="56" rx="12" fill="#ffffff"/>
  <!-- Router LEDs -->
  <circle cx="80" cy="148" r="6" fill="#4CAF50"/>
  <circle cx="100" cy="148" r="6" fill="#4CAF50"/>
  <circle cx="120" cy="148" r="6" fill="#FFC107"/>
  <circle cx="140" cy="148" r="6" fill="#9E9E9E"/>
  <!-- Antennas -->
  <rect x="72" y="60" width="6" height="64" rx="3" fill="#ffffff"/>
  <circle cx="75" cy="56" r="8" fill="#ffffff" fill-opacity="0.8"/>
  <rect x="178" y="60" width="6" height="64" rx="3" fill="#ffffff"/>
  <circle cx="181" cy="56" r="8" fill="#ffffff" fill-opacity="0.8"/>
  <!-- WiFi waves from left antenna -->
  <path d="M 55 45 Q 75 25 95 45" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6"/>
  <path d="M 45 35 Q 75 10 105 35" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.4"/>
  <!-- WiFi waves from right antenna -->
  <path d="M 161 45 Q 181 25 201 45" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.6"/>
  <path d="M 151 35 Q 181 10 211 35" fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.4"/>
  <!-- Text "OWrt" -->
  <text x="128" y="210" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.9">OpenWrt</text>
</svg>
